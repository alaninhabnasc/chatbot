<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DialogX Chat</title>

<style>
    body {
        background: #7b43b4;
        font-family: Arial, sans-serif;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .chat-container {
        background: #dde1ff;
        width: 350px;
        max-width: 95%;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        position: relative;
        display: flex;
        flex-direction: column;
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        position: absolute;
        top: 12px;
        left: 12px;
    }

    .logo img {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        object-fit: cover;
        opacity: 0.95;
    }

    .logo span {
        font-weight: 600;
        color: #4b0082;
        font-size: 22px;
        transform: translateY(2px);
    }

    #chat {
        flex: 1;
        overflow-y: auto;
        margin-top: 95px;
        margin-bottom: 15px;
        padding-right: 8px;
    }

    .message {
        margin-bottom: 10px;
        font-size: 15px;
        line-height: 1.4;
        border-radius: 10px;
        padding: 8px 12px;
        max-width: 80%;
        word-wrap: break-word;
    }

    .bot {
        background: #ffffff;
        color: #4b0082;
    }

    .user {
        background: #7b43b4;
        color: #fff;
        margin-left: auto;
        text-align: right;
    }

    .input-row {
        display: flex;
        gap: 8px;
    }

    input {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    button {
        padding: 0 20px;
        background: #7b43b4;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
    }

    button:hover {
        background: #642e9b;
    }

    @media (max-width: 768px) {
        body {
            background: #dde1ff;
            align-items: flex-start;
        }

        .chat-container {
            width: 100%;
            max-width: 100%;
            min-height: 100vh;
            border-radius: 0;
            box-shadow: none;
        }
    }
</style>
</head>

<body>

<div class="chat-container">

    <div class="logo">
        <img src="logo.jpeg" alt="Logo">
        <span>DialogX</span>
    </div>

    <div id="chat"></div>

    <div class="input-row">

        <input 
            id="userInput" 
            type="text" 
            placeholder="Digite aqui..." 
            autofocus
        >

        <button onclick="sendMessage()">
            Enviar
        </button>

    </div>

</div>

<script>

window.onload = () => {

window.onload = () => {

botMessage("Olá! 💜");
botMessage("Bem-vindo à ModaViva.");
botMessage("Posso informar preços, tamanhos, cores, estoque, frete e formas de pagamento.");
botMessage("Quando desejar finalizar uma compra, solicite um atendente.");

};


function botMessage(text) {

    const chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="message bot">${text}</div>
    `;

    chat.scrollTop = chat.scrollHeight;
}

function userMessage(text) {

    const chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="message user">${text}</div>
    `;

    chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {

    const input = document.getElementById("userInput");

    const msg = input.value.trim();

    if (!msg) return;

    userMessage(msg);

    input.value = "";

    handleResponse(msg);
}

document
.getElementById("userInput")
.addEventListener("keypress", function(event) {

    if (event.key === "Enter") {

        sendMessage();

    }

});

async function handleResponse(msg) {

const produtos = [
{
nome: "camiseta básica premium",
preco: "R$ 49,90",
cores: ["preto", "branco", "azul", "vermelho"],
tamanhos: ["P", "M", "G", "GG"]
},
{
nome: "camisa social slim",
preco: "R$ 89,90",
cores: ["branco", "azul", "preto"],
tamanhos: ["P", "M", "G", "GG"]
},
{
nome: "calça jeans premium",
preco: "R$ 129,90",
cores: ["azul", "preto"],
tamanhos: ["38", "40", "42", "44", "46"]
}
];

function handleResponse(msg){

botMessage("Digitando...");

setTimeout(() => {

const texto = msg.toLowerCase();

const mensagens = document.querySelectorAll(".bot");
mensagens[mensagens.length - 1].remove();

if(
texto.includes("comprar") ||
texto.includes("pedido") ||
texto.includes("finalizar") ||
texto.includes("atendente")
){
botMessage(
"Perfeito! Vou transferir você para nossa atendente Mariana. Ela irá finalizar seu pedido."
);
return;
}

for(const produto of produtos){

if(texto.includes(produto.nome.split(" ")[0])){

botMessage(
`${produto.nome.toUpperCase()}
Preço: ${produto.preco}
Cores: ${produto.cores.join(", ")}
Tamanhos: ${produto.tamanhos.join(", ")}`
);

return;
}
}

if(texto.includes("frete")){
botMessage(
"Entregamos para todo o Brasil. Frete grátis acima de R$ 199."
);
return;
}

if(texto.includes("pix") || texto.includes("pagamento")){
botMessage(
"Aceitamos PIX, cartão de crédito, débito e boleto."
);
return;
}

if(texto.includes("horário")){
botMessage(
"Nosso atendimento funciona de segunda a sexta das 8h às 18h."
);
return;
}

botMessage(
"Posso ajudar com produtos, tamanhos, preços, estoque, frete ou formas de pagamento."
);

},1000);
}

</script>
