<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DialogX Chat</title>

<style>
    body {
        background: #7b43b4;
        font-family: Arial, sans-serif;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .chat-container {
        background: #dde1ff;
        width: 350px;
        max-width: 95%;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        position: relative;
        display: flex;
        flex-direction: column;
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        position: absolute;
        top: 12px;
        left: 12px;
    }

    .logo img {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        object-fit: cover;
        opacity: 0.95;
    }

    .logo span {
        font-weight: 600;
        color: #4b0082;
        font-size: 22px;
        transform: translateY(2px);
    }

    #chat {
        flex: 1;
        overflow-y: auto;
        margin-top: 95px;
        margin-bottom: 15px;
        padding-right: 8px;
    }

    .message {
        margin-bottom: 10px;
        font-size: 15px;
        line-height: 1.4;
        border-radius: 10px;
        padding: 8px 12px;
        max-width: 80%;
        word-wrap: break-word;
    }

    .bot {
        background: #ffffff;
        color: #4b0082;
    }

    .user {
        background: #7b43b4;
        color: #fff;
        margin-left: auto;
        text-align: right;
    }

    .input-row {
        display: flex;
        gap: 8px;
    }

    input {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    button {
        padding: 0 20px;
        background: #7b43b4;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
    }

    button:hover {
        background: #642e9b;
    }

    @media (max-width: 768px) {
        body {
            background: #dde1ff;
            align-items: flex-start;
        }

        .chat-container {
            width: 100%;
            max-width: 100%;
            min-height: 100vh;
            border-radius: 0;
            box-shadow: none;
        }
    }
</style>
</head>

<body>

<div class="chat-container">

    <div class="logo">
        <img src="logo.jpeg" alt="Logo">
        <span>DialogX</span>
    </div>

    <div id="chat"></div>

    <div class="input-row">

        <input 
            id="userInput" 
            type="text" 
            placeholder="Digite aqui..." 
            autofocus
        >

        <button onclick="sendMessage()">
            Enviar
        </button>

    </div>

</div>

<script>

window.onload = () => {

botMessage("Olá! 💜");
botMessage("Bem-vindo à ModaVia.");
botMessage("Posso informar preços, tamanhos, cores, estoque, frete e formas de pagamento.");
botMessage("Quando desejar finalizar uma compra, solicite um atendente.");

};


function botMessage(text) {

    const chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="message bot">${text}</div>
    `;

    chat.scrollTop = chat.scrollHeight;
}

function userMessage(text) {

    const chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="message user">${text}</div>
    `;

    chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {

    const input = document.getElementById("userInput");

    const msg = input.value.trim();

    if (!msg) return;

    userMessage(msg);

    input.value = "";

    handleResponse(msg);
}

document
.getElementById("userInput")
.addEventListener("keypress", function(event) {

    if (event.key === "Enter") {

        sendMessage();

    }

});

async function handleResponse(msg){

botMessage("Digitando...");

const prompt = `
Você é Mariana, assistente virtual da loja ModaViva.

REGRAS:

* Responda apenas sobre a ModaViva.
* Seja simpática e profissional.
* Não fale de assuntos fora da loja.
* Nunca invente produtos.

LOJA MODAVIVA

Camiseta Básica
Preço: R$49,90
Cores: preta, branca e azul
Estoque:
P: 10
M: 8
G: 5
GG: 2

Camisa Social
Preço: R$89,90
Cores: preta, branca e azul
Estoque:
P: 4
M: 6
G: 7
GG: 3

Calça Jeans
Preço: R$129,90
Cores: preta e azul
Estoque:
38: 5
40: 8
42: 6
44: 4
46: 2

Formas de pagamento:
PIX
Cartão de crédito
Cartão de débito
Boleto

Entrega:
Todo o Brasil
Prazo de 3 a 10 dias úteis
Frete grátis acima de R$199

Trocas:
Até 30 dias

Atendente humano:
Mariana

Se o cliente quiser comprar, finalizar pedido ou falar com um atendente, responda:
"Perfeito! Vou transferir você para nossa atendente Mariana para finalizar sua compra."

Pergunta do cliente:
${msg}
`;

try{

const response = await fetch(
`https://text.pollinations.ai/${encodeURIComponent(prompt)}`
);

const resposta = await response.text();

const mensagens = document.querySelectorAll(".bot");

if(mensagens.length > 0){
mensagens[mensagens.length - 1].remove();
}

botMessage(resposta);

}catch(error){

const mensagens = document.querySelectorAll(".bot");

if(mensagens.length > 0){
mensagens[mensagens.length - 1].remove();
}

botMessage("Erro ao conectar com a assistente virtual.");

}

}
</script>
