<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DialogX Chat</title>

<style>
    body {
        background: #7b43b4;
        font-family: Arial, sans-serif;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .chat-container {
        background: #dde1ff;
        width: 350px;
        max-width: 95%;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        position: relative;
        display: flex;
        flex-direction: column;
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        position: absolute;
        top: 12px;
        left: 12px;
    }

    .logo img {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        object-fit: cover;
        opacity: 0.95;
    }

    .logo span {
        font-weight: 600;
        color: #4b0082;
        font-size: 22px;
        transform: translateY(2px);
    }

    #chat {
        flex: 1;
        overflow-y: auto;
        margin-top: 95px;
        margin-bottom: 15px;
        padding-right: 8px;
    }

    .message {
        margin-bottom: 10px;
        font-size: 15px;
        line-height: 1.4;
        border-radius: 10px;
        padding: 8px 12px;
        max-width: 80%;
        word-wrap: break-word;
    }

    .bot {
        background: #ffffff;
        color: #4b0082;
    }

    .user {
        background: #7b43b4;
        color: #fff;
        margin-left: auto;
        text-align: right;
    }

    .input-row {
        display: flex;
        gap: 8px;
    }

    input {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    button {
        padding: 0 20px;
        background: #7b43b4;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
    }

    button:hover {
        background: #642e9b;
    }

    @media (max-width: 768px) {
        body {
            background: #dde1ff;
            align-items: flex-start;
        }

        .chat-container {
            width: 100%;
            max-width: 100%;
            min-height: 100vh;
            border-radius: 0;
            box-shadow: none;
        }
    }
</style>
</head>

<body>

<div class="chat-container">

    <div class="logo">
        <img src="logo.jpeg" alt="Logo">
        <span>DialogX</span>
    </div>

    <div id="chat"></div>

    <div class="input-row">

        <input 
            id="userInput" 
            type="text" 
            placeholder="Digite aqui..." 
            autofocus
        >

        <button onclick="sendMessage()">
            Enviar
        </button>

    </div>

</div>

<script>

window.onload = () => {

    botMessage("Olá! 💜");
    botMessage("Sou a assistente virtual do setor de vendas. Como posso ajudar?");

};

function botMessage(text) {

    const chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="message bot">${text}</div>
    `;

    chat.scrollTop = chat.scrollHeight;
}

function userMessage(text) {

    const chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="message user">${text}</div>
    `;

    chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {

    const input = document.getElementById("userInput");

    const msg = input.value.trim();

    if (!msg) return;

    userMessage(msg);

    input.value = "";

    handleResponse(msg);
}

document
.getElementById("userInput")
.addEventListener("keypress", function(event) {

    if (event.key === "Enter") {

        sendMessage();

    }

});

async function handleResponse(msg) {

    botMessage("Digitando...");

    try {

        // Etapa 1: verificar se a mensagem é relacionada a vendas

        const verificador = await fetch(
            `https://text.pollinations.ai/${encodeURIComponent(`
Você é um classificador.

Responda APENAS com:
SIM
ou
NÃO

A mensagem abaixo está relacionada a:
- vendas
- produtos
- serviços
- orçamento
- estoque
- pagamentos
- pedidos
- entregas
- atendimento comercial

Mensagem:
${msg}
`)}?model=openai`
        );

        const resultado = (await verificador.text())
            .trim()
            .toUpperCase();

        const mensagens = document.querySelectorAll(".bot");

        if (mensagens.length > 0) {
            mensagens[mensagens.length - 1].remove();
        }

        if (!resultado.includes("SIM")) {

            botMessage(
                "Desculpe, posso ajudar apenas com assuntos relacionados ao setor de vendas."
            );

            return;
        }

        // Etapa 2: responder como assistente de vendas

        botMessage("Digitando...");

        const prompt = `
Você é a assistente virtual de uma empresa.

REGRAS:
- Responda apenas assuntos relacionados a vendas.
- Ajude com produtos, preços, estoque, orçamento, pedidos, pagamentos, frete e entregas.
- Seja simpática, profissional e objetiva.
- Nunca responda assuntos fora do contexto comercial.

Cliente:
${msg}
`;

        const resposta = await fetch(
            `https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai`
        );

        const textoIA = await resposta.text();

        const mensagens2 = document.querySelectorAll(".bot");

        if (mensagens2.length > 0) {
            mensagens2[mensagens2.length - 1].remove();
        }

        botMessage(textoIA);

    } catch (erro) {

        const mensagens = document.querySelectorAll(".bot");

        if (mensagens.length > 0) {
            mensagens[mensagens.length - 1].remove();
        }

        botMessage("Erro ao conectar com a IA.");

        console.error(erro);

    }
}

</script>
